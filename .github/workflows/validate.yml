name: validate

# Push/PR CI is disabled because GitHub Actions is currently blocked by account billing.
# Run locally with: python scripts/validate_skills.py
on:
  workflow_dispatch:

jobs:
  skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/validate_skills.py
